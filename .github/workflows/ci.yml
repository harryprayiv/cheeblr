name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixpkgs.cachix.org-1:q91R6hxbwFvDqTSDKwDAV4T5PxqXGxswD8vhONFMeOE= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          save-always: true

      - name: Build
        run: nix build --accept-flake-config

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixpkgs.cachix.org-1:q91R6hxbwFvDqTSDKwDAV4T5PxqXGxswD8vhONFMeOE= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          save-always: true

      - name: Run unit tests
        run: nix develop --accept-flake-config .#ci --command test-unit

  integration-http:
    name: Integration tests (HTTP)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixpkgs.cachix.org-1:q91R6hxbwFvDqTSDKwDAV4T5PxqXGxswD8vhONFMeOE= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          save-always: true

      - name: Build backend binary
        run: nix build --accept-flake-config .#backend

      - name: Run HTTP integration tests
        env:
          PGDATA: /tmp/cheeblr-pgdata
          BACKEND_BIN: ${{ github.workspace }}/result/bin/cheeblr-backend
        run: nix develop --accept-flake-config .#ci --command test-integration

  integration-tls:
    name: Integration tests (TLS)
    runs-on: ubuntu-latest
    needs: integration-http
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://nixpkgs.cachix.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixpkgs.cachix.org-1:q91R6hxbwFvDqTSDKwDAV4T5PxqXGxswD8vhONFMeOE= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          save-always: true

      - name: Build backend binary
        run: nix build --accept-flake-config .#backend

      - name: Install mkcert CA
        run: |
          nix develop --accept-flake-config .#ci --command bash -c "
            CAROOT=\$(mkcert -CAROOT)
            mkdir -p \"\$CAROOT\"
            mkcert -install || true
            if [ -f \"\$CAROOT/rootCA.pem\" ]; then
              sudo cp \"\$CAROOT/rootCA.pem\" /usr/local/share/ca-certificates/mkcert-cheeblr.crt
              sudo update-ca-certificates
            fi
          "

      - name: Run TLS integration tests
        env:
          PGDATA: /tmp/cheeblr-pgdata
          BACKEND_BIN: ${{ github.workspace }}/result/bin/cheeblr-backend
        run: nix develop --accept-flake-config .#ci --command test-integration-tls

  ci-ok:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs: [build, unit-tests, integration-http, integration-tls]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          failures=$(echo "$results" | grep -o '"result":"failure"' | wc -l)
          cancelled=$(echo "$results" | grep -o '"result":"cancelled"' | wc -l)
          if [ "$failures" -gt 0 ] || [ "$cancelled" -gt 0 ]; then
            echo "$results"
            exit 1
          fi
          echo "All CI jobs passed."