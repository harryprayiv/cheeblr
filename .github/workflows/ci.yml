name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday midnight — keeps the IOG cache warm and catches upstream breakage.
    - cron: "0 0 * * 0"
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Surfaced to all steps; mirrors what nix/config.nix declares.
  CHEEBLR_NAME: cheeblr
  BACKEND_PORT: "8080"
  FRONTEND_PORT: "5173"
  DB_PORT: "5432"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Phase 0: Build
  # Validates that cabal and spago both compile before running
  # anything. Subsequent jobs depend on this, so a broken build
  # stops the pipeline immediately.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (cabal + spago)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      # cabal build artifacts are keyed on the cabal.project.freeze /
      # cabal.project so they're reused across runs on the same dep set.
      - name: Restore cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            backend/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('backend/cabal.project', 'backend/cabal.project.freeze', 'backend/**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Restore spago / node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.spago
            frontend/node_modules
            frontend/output
          key: spago-${{ runner.os }}-${{ hashFiles('frontend/spago.yaml', 'frontend/spago.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            spago-${{ runner.os }}-

      - name: Build backend (cabal)
        run: nix develop --command bash -c "cd backend && cabal build all"

      - name: Build frontend (spago)
        run: nix develop --command bash -c "cd frontend && spago build"

  # ─────────────────────────────────────────────────────────────
  # Phase 1: Unit tests
  # Runs Haskell unit tests (cabal test) and PureScript unit
  # tests (spago test) in isolation — no running services needed.
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Restore cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            backend/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('backend/cabal.project', 'backend/cabal.project.freeze', 'backend/**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Restore spago / node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.spago
            frontend/node_modules
            frontend/output
          key: spago-${{ runner.os }}-${{ hashFiles('frontend/spago.yaml', 'frontend/spago.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            spago-${{ runner.os }}-

      - name: Run unit tests
        # test-unit is defined in nix/test-suite.nix and runs:
        #   cabal test cheeblr-unit-tests  (Haskell)
        #   spago test                     (PureScript)
        run: nix develop --command test-unit

  # ─────────────────────────────────────────────────────────────
  # Phase 2: HTTP integration tests
  # test-integration spins up its own ephemeral PostgreSQL (unix
  # socket only, no port conflict risk), starts the backend on
  # port 18080, and tears everything down via trap on exit.
  # ─────────────────────────────────────────────────────────────
  integration-http:
    name: Integration tests (HTTP)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Restore cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            backend/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('backend/cabal.project', 'backend/cabal.project.freeze', 'backend/**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Restore spago / node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.spago
            frontend/node_modules
            frontend/output
          key: spago-${{ runner.os }}-${{ hashFiles('frontend/spago.yaml', 'frontend/spago.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            spago-${{ runner.os }}-

      - name: Run HTTP integration tests
        # PGDATA must be set for the pg-* helper env setup block inside
        # test-integration, even though the script overrides it with
        # TEST_PGDATA. Setting it to /tmp/cheeblr-pgdata satisfies the
        # validateEnv guard without conflicting with the ephemeral instance.
        env:
          PGDATA: /tmp/cheeblr-pgdata
        run: nix develop --command test-integration

  # ─────────────────────────────────────────────────────────────
  # Phase 3: TLS integration tests
  # Same as above but with USE_TLS=true. mkcert -install needs
  # to write to the system trust store, which requires sudo on
  # GitHub-hosted runners (they allow it without a password).
  # ─────────────────────────────────────────────────────────────
  integration-tls:
    name: Integration tests (TLS)
    runs-on: ubuntu-latest
    needs: integration-http

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Restore cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            backend/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('backend/cabal.project', 'backend/cabal.project.freeze', 'backend/**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Restore spago / node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.spago
            frontend/node_modules
            frontend/output
          key: spago-${{ runner.os }}-${{ hashFiles('frontend/spago.yaml', 'frontend/spago.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            spago-${{ runner.os }}-

      # mkcert -install writes to /usr/local/share/ca-certificates and
      # calls update-ca-certificates, both of which need root on Ubuntu.
      - name: Install mkcert root CA into system trust store
        run: |
          nix develop --command bash -c "
            CAROOT=\$(mkcert -CAROOT)
            mkdir -p \"\$CAROOT\"
            mkcert -install || true
            if [ -f \"\$CAROOT/rootCA.pem\" ]; then
              sudo cp \"\$CAROOT/rootCA.pem\" /usr/local/share/ca-certificates/mkcert-cheeblr.crt
              sudo update-ca-certificates
              echo 'mkcert CA installed into system trust store'
            fi
          "

      - name: Run TLS integration tests
        env:
          PGDATA: /tmp/cheeblr-pgdata
        run: nix develop --command test-integration-tls

  # ─────────────────────────────────────────────────────────────
  # Summary job — gives a single required status check to set in
  # branch protection rules instead of listing every job.
  # ─────────────────────────────────────────────────────────────
  ci-ok:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs: [build, unit-tests, integration-http, integration-tls]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          failures=$(echo "$results" | grep -o '"result":"failure"' | wc -l)
          cancelled=$(echo "$results" | grep -o '"result":"cancelled"' | wc -l)
          if [ "$failures" -gt 0 ] || [ "$cancelled" -gt 0 ]; then
            echo "One or more CI jobs failed or were cancelled."
            echo "$results"
            exit 1
          fi
          echo "All CI jobs passed."