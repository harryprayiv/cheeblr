name: Nix Flake Check

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  workflow_dispatch:

jobs:
  flake-check:
    name: Evaluate flake (x86_64-linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      # nix flake show evaluates ALL systems regardless of --system, which
      # causes "aarch64-darwin required but I am x86_64-linux" on the
      # haskell.nix IFD path. Instead we eval specific x86_64-linux
      # attributes directly, which triggers the same IFD resolution but
      # only for the runner's native system.
      - name: Evaluate devShell (x86_64-linux)
        run: |
          nix eval --accept-flake-config --allow-import-from-derivation \
            .#devShells.x86_64-linux.default \
            --apply 'x: "ok: ${x.name}"'

      - name: Evaluate packages (x86_64-linux)
        run: |
          nix eval --accept-flake-config --allow-import-from-derivation \
            .#packages.x86_64-linux \
            --apply 'builtins.attrNames'