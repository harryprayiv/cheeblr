name: Nix Flake Check

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
  workflow_dispatch:

jobs:
  flake-check:
    name: Evaluate flake
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes ca-derivations
            allow-import-from-derivation = true
            substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-substituters = https://cache.iog.io https://cache.nixos.org https://hercules-ci.cachix.org
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hercules-ci.cachix.org-1:ZZeDl9Va+xe9j+KqdzoBZMFJHVQ42Uu/c/1/KMC5Lw0=

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Show flake outputs
        # --accept-flake-config picks up the substituters/keys in your flake's
        # nixConfig block, which is required for haskell.nix IFD to find the
        # plan-to-nix-pkgs derivation in the IOG cache.
        # Do NOT pass --no-build: haskell.nix uses import-from-derivation
        # and --no-build prevents IFD from running, causing "path not valid".
        run: nix flake show --accept-flake-config --allow-import-from-derivation --system x86_64-linux